name: Build & Release

# Trigger:
#  - push di un tag vX.Y.Z  →  build + GitHub Release
#  - avvio manuale           →  build + upload artifact (senza release)
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write   # necessario per creare la GitHub Release

jobs:
  # ─────────────────────────────────────────────
  # macOS – Mac Catalyst (.dmg)
  # ─────────────────────────────────────────────
  build-macos:
    name: Build · macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Mac Catalyst workload
        run: dotnet workload install maui-maccatalyst

      - name: Publish (Mac Catalyst – Release)
        run: |
          dotnet publish WeeklyReport/UI/UI.csproj \
            -f net10.0-maccatalyst \
            -c Release \
            -p:RunAOTCompilation=false

      - name: Create DMG
        run: |
          APP=$(find WeeklyReport/UI/bin/Release -name '*.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Nessun bundle .app trovato"
            find WeeklyReport/UI/bin/Release -maxdepth 4 | sort
            exit 1
          fi
          echo "Packaging: $APP"
          hdiutil create \
            -volname "eris" \
            -srcfolder "$APP" \
            -ov \
            -format UDZO \
            eris-macos.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: eris-macos
          path: eris-macos.dmg
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Windows 11 – unpackaged (.zip)
  # ─────────────────────────────────────────────
  build-windows:
    name: Build · Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Publish (Windows unpackaged – Release)
        run: >-
          dotnet publish WeeklyReport/UI/UI.csproj
          -f net10.0-windows10.0.19041.0
          -c Release

      - name: Create ZIP
        shell: pwsh
        run: |
          $publishDir = "WeeklyReport\UI\bin\Release\net10.0-windows10.0.19041.0\publish"
          if (-not (Test-Path $publishDir)) {
            Write-Error "Directory publish non trovata: $publishDir"
            Get-ChildItem -Recurse "WeeklyReport\UI\bin\Release" | Select-Object -ExpandProperty FullName
            exit 1
          }
          Write-Host "Packaging: $publishDir"
          Compress-Archive -Path "$publishDir\*" -DestinationPath eris-windows.zip

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: eris-windows
          path: eris-windows.zip
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # GitHub Release (solo su tag v*)
  # ─────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: eris-macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: eris-windows

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            eris-macos.dmg
            eris-windows.zip
          generate_release_notes: true
